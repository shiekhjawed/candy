<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candy Crush  for javascript class presentation</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background: url('./background.jpg') no-repeat center center fixed;
    background-size: cover;
}

.game{
    text-align:center;
    padding:10px 20px;
    border-radius:15px;
}

h2{
    color:rgb(165, 36, 36);
    font-size: 48px;
    margin: 10px 0 5px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(8, 1fr);  /* ✅ Changed from 60px to 1fr */
    gap:4px;
    background:#2196f3;
    padding:10px;
    border-radius:10px;
    max-width: 500px;  /* ✅ Added max-width */
    margin: 0 auto;    /* ✅ Center the grid */
}
.cell{
    width: 100%;       /* ✅ Changed from 60px */
    height: 60px;      /* ✅ Keep height fixed */
    aspect-ratio: 1;   /* ✅ Makes cells square */
    background-size:cover;
    border-radius:8px;
    cursor:pointer;
    transition: all 0.1s;
}
.cell.selected{
    outline:4px solid yellow;
    transform: scale(1.1);
}

#resetButton{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    background:#861339;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#resetButton:hover{
    background:#c41e5a;
}

#levelDisplay {
    font-size: 26px;
    color: #FFD700;
    margin: 10px 0;
    font-weight: bold;
}

#scoreDisplay {
    font-size: 22px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 12px 20px;
    border-radius: 12px;
    margin: 10px 0;
    display: inline-block;
}

#comboMsg {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 22px;
    font-weight: bold;
    z-index: 999;
    display: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    animation: comboAnim 3s ease-out;
}

@keyframes comboAnim {
    0% { transform: translateX(-50%) translateY(-30px) scale(0.7); opacity: 0; }
    20% { transform: translateX(-50%) translateY(0) scale(1.1); opacity: 1; }
    80% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-30px) scale(0.7); opacity: 0; }
}

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup-content {
    background: linear-gradient(45deg, #ff6b6b, #ffd93d);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    animation: popupAnim 0.5s ease-out;
}

@keyframes popupAnim {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.popup h3 { font-size: 36px; margin: 0 0 15px 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
.popup button { 
    padding: 15px 35px; 
    font-size: 20px; 
    background: #4CAF50; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    margin-top: 20px; 
}
.popup button:hover { background: #45a049; transform: scale(1.08); }
#soundToggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1001;
    padding: 12px 20px;
    background: linear-gradient(45deg, #ff6b6b, #ffd93d);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: all 0.3s;
}
#soundToggle:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}
#soundToggle.muted {
    background: linear-gradient(45deg, #666, #999);
}
#startScreen {
    display: flex;
    justify-content: center;
    align-items: center;
    background: url(./background.jpg) no-repeat center center fixed;
      background-size: 400% 400%;
            animation: gradientShift 20s linear infinite;

        
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

</style>
</head>

<body>
    <!-- ADD THIS BUTTON FIRST -->
<button id="soundToggle" onclick="toggleSound()">🔊 SOUND ON</button>

<div class="game">
    <h2 Candy Crush FIXED </h2>
    
    <div id="levelDisplay">Level: <span id="level">1</span></div>
    
    <div id="scoreDisplay">
        Score: <span id="score">0</span> / <span id="targetScore">3000</span>
    </div>

    <div class="grid" id="grid"></div>

    <button id="resetButton" onclick="resetGame()">🔄 Restart Game</button>
</div>

<div id="comboMsg"></div>

<div id="levelUpPopup" class="popup" style="display: none;">
    <div class="popup-content">
        <h3>🎉 LEVEL UP! 🎉</h3>
        <p>🏆 Level <span id="nextLevelNum">2</span> Unlocked!</p>
        <p>Next Target: <span id="newTarget">6000</span></p>
        <button onclick="nextLevel()">Continue ➡️</button>
    </div>  
</div>
<!-- START SCREEN OVERLAY -->.
<div id="startScreen" class="popup" style="display: flex;">
    <div class="popup-content" style="background: linear-gradient(45deg, #ff6b6b, #ffd93d, #4ecdc4); max-width: 500px;">
        <h2 style="font-size: 48px; margin: 0 0 20px 0;"> Candy Crush </h2>
        <p style="font-size: 24px; margin: 0 0 30px 0;">Ready for sweet matches?</p>
        <button onclick="startGame()" style="padding: 20px 50px; font-size: 24px; background: #4CAF50; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            👆 Tap to Start Game!
        </button>
        <p style="font-size: 16px; margin-top: 20px; opacity: 0.9;">(Enables sound too!)</p>
    </div>
</div>


<script>

const ROWS = 8, COLS = 8;
let board = [];
let selected = null;
let score = 0;
let level = 1;
let targetScore = 3000;
let busy = false;

const colors = ["Blue", "Red", "Green", "Yellow", "Purple"];
const CHOCO = "Choco.png";

function getColor(c) {
    if (!c) return null;
    return c.split("-")[0].replace(".png", "");
}

function rand() {
    return colors[Math.floor(Math.random() * colors.length)] + ".png";
}

function striped(color, dir) {
    return `${color}-Striped-${dir}.png`;
}

function isChoco(candy) {
    return candy && candy.includes("Choco");
}

function isStriped(candy) {
    return candy && candy.includes("Striped");
}

// ✅ FIX 1: NO MATCHES AT START
function noMatchSpawn() {
    let attempts = 0;
    const maxAttempts = 100; // Prevent infinite loop
    
    do {
        createBoardWithoutMatches();
        attempts++;
    } while (find().matches.length > 0 && attempts < maxAttempts);
    
    // If still matches after max attempts, just use it (rare case)
    console.log(`Spawn attempts: ${attempts}`);
}

function createBoardWithoutMatches() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
            board[r][c] = rand();
        }
    }
}

function showCombo(msg, color = 'linear-gradient(45deg, #ff0080, #ff8c00)') {
    const comboEl = document.getElementById('comboMsg');
    comboEl.textContent = msg;
    comboEl.style.background = color;
    comboEl.style.display = 'block';
    setTimeout(() => comboEl.style.display = 'none', 3000);
}

// ✅ FIX 2: SPECIAL COMBOS BASED ON CURRENT MATCH
function calculateComboMultiplier(matches) {
    let chocoCount = 0;
    let stripedCount = 0;

    // Count ONLY candies in CURRENT MATCH
    matches.forEach(([r, c]) => {
        let candy = board[r][c];
        if (isChoco(candy)) chocoCount++;
        if (isStriped(candy)) stripedCount++;
    });

    let multiplier = 1;
    let comboMsg = "";
    let comboColor = 'linear-gradient(45deg, #ff0080, #ff8c00)';

    if (chocoCount >= 1 && stripedCount >= 1) {
        multiplier = 3.0;
        comboMsg = `💥 CHOCO + STRIPED! (3x)`;
        comboColor = 'linear-gradient(45deg, #ff00ff, #00ffff)';
    } else if (chocoCount >= 2) {
        multiplier = 2.5;
        comboMsg = `🍫 DOUBLE CHOCO! (2.5x)`;
        comboColor = 'linear-gradient(45deg, #8B4513, #D2691E)';
    } else if (stripedCount >= 2) {
        multiplier = 2.0;
        comboMsg = `🔥 DOUBLE STRIPED! (2x)`;
        comboColor = 'linear-gradient(45deg, #FF4500, #FFD700)';
    } else if (chocoCount >= 1) {
        multiplier = 1.8;
        comboMsg = `⭐ CHOCO BONUS! (1.8x)`;
    } else if (stripedCount >= 1) {
        multiplier = 1.5;
        comboMsg = `⭐ STRIPED BONUS! (1.5x)`;
    }

    if (comboMsg) showCombo(comboMsg, comboColor);
    return multiplier;
}

function create() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    noMatchSpawn(); // ✅ GUARANTEES no matches at start
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.onclick = click;
            grid.appendChild(cell);
        }
    }
    update();
}

function update() {
    const cells = document.querySelectorAll(".cell");
    cells.forEach((cell, i) => {
        const r = Math.floor(i / COLS);
        const c = i % COLS;
        const val = board[r][c];
        cell.style.backgroundImage = val ? `url('./images/${val}')` : "none";
    });
    updateDisplay();
}

function updateDisplay() {
    document.getElementById("level").innerText = level;
    document.getElementById("score").innerText = score.toLocaleString();
    document.getElementById("targetScore").innerText = targetScore.toLocaleString();
}

function click(e) {
    if (busy) return;
    const r = +e.target.dataset.r;
    const c = +e.target.dataset.c;

    if (!selected) {
        selected = { r, c };
        e.target.classList.add("selected");
        return;
    }

    const dr = Math.abs(selected.r - r);
    const dc = Math.abs(selected.c - c);

    if (dr + dc === 1) {
        swap(selected.r, selected.c, r, c);
    }

    document.querySelectorAll(".cell").forEach(x => x.classList.remove("selected"));
    selected = null;
}

function swap(r1, c1, r2, c2) {
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
    update();

    if (find().matches.length > 0) {
        busy = true;
        setTimeout(crush, 200);
    } else {
        [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
        update();
    }
}

function find() {
    let matches = new Set();
    let specials = [];

    // Horizontal matches
    for (let r = 0; r < ROWS; r++) {
        let count = 1;
        for (let c = 1; c <= COLS; c++) {
            if (c < COLS && getColor(board[r][c]) === getColor(board[r][c-1])) {
                count++;
            } else {
                if (count >= 3) {
                    const start = c - count;
                    for (let k = 0; k < count; k++) {
                        matches.add(`${r},${start + k}`);
                    }
                    if (count >= 5) {
                        specials.push({r: r, c: start + 2, type: CHOCO});
                    } else if (count === 4) {
                        const color = getColor(board[r][start]);
                        specials.push({r: r, c: start + 1, type: striped(color, "Horizontal")});
                    }
                }
                count = 1;
            }
        }
    }

    // Vertical matches
    for (let c = 0; c < COLS; c++) {
        let count = 1;
        for (let r = 1; r <= ROWS; r++) {
            if (r < ROWS && getColor(board[r][c]) === getColor(board[r-1][c])) {
                count++;
            } else {
                if (count >= 3) {
                    const start = r - count;
                    for (let k = 0; k < count; k++) {
                        matches.add(`${start + k},${c}`);
                    }
                    if (count >= 5) {
                        specials.push({r: start + 2, c: c, type: CHOCO});
                    } else if (count === 4) {
                        const color = getColor(board[start][c]);
                        specials.push({r: start + 1, c: c, type: striped(color, "Vertical")});
                    }
                }
                count = 1;
            }
        }
    }

    return { 
        matches: [...matches].map(x => x.split(",").map(Number)), 
        specials 
    };
}

// ✅ FIXED CRUSH FUNCTION
function crush() {
    let { matches, specials } = find();

    if (matches.length === 0) {
        busy = false;
        checkLevelUp();
        return;
    }

    // ✅ Calculate multiplier based on CURRENT MATCH specials
    const multiplier = calculateComboMultiplier(matches);
    let baseScore = matches.length * 10;
    let specialBonus = 0;

    matches.forEach(([r, c]) => {
        let candy = board[r][c];
        if (isChoco(candy)) specialBonus += 200;
        if (isStriped(candy)) specialBonus += 120;
    });

    score += Math.round((baseScore + specialBonus) * multiplier);
    updateDisplay();

    // Clear matched candies
    matches.forEach(([r, c]) => board[r][c] = null);

    // Create new special candies
    specials.forEach(s => {
        if (s.r >= 0 && s.c >= 0 && s.r < ROWS && s.c < COLS && !board[s.r][s.c]) {
            board[s.r][s.c] = s.type;
        }
    });

    update();
    setTimeout(drop, 300);
}

function drop() {
    for (let c = 0; c < COLS; c++) {
        let write = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
            if (board[r][c] !== null) {
                board[write][c] = board[r][c];
                if (write !== r) board[r][c] = null;
                write--;
            }
        }
        while (write >= 0) {
            board[write][c] = rand();
            write--;
        }
    }
    update();

    setTimeout(() => {
        if (find().matches.length > 0) {
            crush();
        } else {
            busy = false;
            checkLevelUp();
        }
    }, 300);
}

function checkLevelUp() {
    if (score >= targetScore && !busy) {
        level++;
        targetScore += 3000;
        document.getElementById('nextLevelNum').textContent = level;
        document.getElementById('newTarget').textContent = targetScore.toLocaleString();
        document.getElementById('levelUpPopup').style.display = 'flex';
        busy = true;
        selected = null;
    }
}

function nextLevel() {
    document.getElementById('levelUpPopup').style.display = 'none';
    busy = false;
    updateDisplay();
}

function resetGame() {
    score = 0;
    level = 1;
    targetScore = 3000;
    busy = false;
    selected = null;
    document.getElementById('levelUpPopup').style.display = 'none';
    create();
    updateDisplay();
}

// 🟢 START THE GAME - PERFECTLY FIXED!
create();
updateDisplay();
// 🎵 FIXED SOUND SYSTEM - 100% WORKING!
let soundEnabled = true;
let audioContext = null;
let audioInitialized = false;

function initAudio() {
    if (audioContext) return;
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioInitialized = true;
    console.log("🎵 Audio initialized!");
}

function playTone(frequency, duration = 0.1, volume = 0.3, type = 'sine') {
    if (!soundEnabled || !audioInitialized || !audioContext) return;
    
    try {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = frequency;
        oscillator.type = type;
        
        gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration);
    } catch(e) {
        console.log("Audio play failed:", e);
    }
}

// 🎵 GAME SOUNDS
function playClick() { playTone(800, 0.08); }
function playSwap() { 
    playTone(600, 0.08); 
    setTimeout(() => playTone(700, 0.08), 40); 
}
function playMatch() {
    playTone(523, 0.15); // C5
    setTimeout(() => playTone(659, 0.15), 80); // E5
    setTimeout(() => playTone(784, 0.15), 160); // G5
}
function playCrush() {
    [400, 500, 600, 700].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.12), i * 60);
    });
}
function playDrop() { playTone(350, 0.2, 0.25, 'sawtooth'); }
function playCombo() {
    [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.2), i * 120);
    });
}
function playLevelUp() {
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.3, 0.4, 'triangle'), i * 200);
    });
}
function playChoco() { playTone(880, 0.25, 0.35); }
function playStriped() {
    playTone(440, 0.18, 0.3, 'sawtooth');
    setTimeout(() => playTone(466, 0.18), 80);
}

// 🎛️ SOUND TOGGLE
function toggleSound() {
    initAudio(); // Initialize on first click
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('soundToggle');
    btn.textContent = soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
    btn.classList.toggle('muted');
    
    if (soundEnabled && audioContext?.state === 'suspended') {
        audioContext.resume();
    }
    console.log("Sound:", soundEnabled ? "ON" : "OFF");
}

// 🔥 FIX: Initialize on FIRST CLICK ANYWHERE
document.addEventListener('click', function firstClick() {
    initAudio();
    document.removeEventListener('click', firstClick);
}, { once: true });

// 🔥 ALSO initialize on sound button click
document.getElementById('soundToggle').addEventListener('click', initAudio);

// 🎵 TEST SOUND (Click sound toggle first!)
console.log("👆 Click SOUND button first, then play game!");
function startGame() {
    // Hide start screen
    document.getElementById('startScreen').style.display = 'none';
    
    // Init audio with user gesture
    initAudio();
    
    // Start the game
    create();
    updateDisplay();
    
    // Play welcome sound
    setTimeout(() => {
        if (soundEnabled) playLevelUp();
    }, 200);
}



</script>

</body>
</html>
