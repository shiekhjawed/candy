<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candy Crush No music</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial;
    background: url('./background.jpg') no-repeat center center fixed;
}

.game{
    text-align:center;
    padding:20px;
    border-radius:15px;
}

h2{
    color:rgb(165, 36, 36);
    font-size: 48px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(8,60px);
    gap:4px;
    background:#2196f3;
    padding:10px;
    border-radius:10px;
}

.cell{
    width:60px;
    height:60px;
    background-size:cover;
    border-radius:8px;
    cursor:pointer;
}

.cell.selected{
    outline:3px solid yellow;
}

#resetButton{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    background:#861339;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#levelDisplay {
    font-size: 24px;
    color: #FFD700;
    margin: 10px 0;
    font-weight: bold;
}

#scoreDisplay {
    font-size: 20px;
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    margin: 10px 0;
}

#comboMsg {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(45deg, #ff0080, #ff8c00);
    color: white;
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 20px;
    font-weight: bold;
    z-index: 999;
    display: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    animation: comboAnim 2s ease-out;
}

@keyframes comboAnim {
    0% { transform: translateX(-50%) translateY(-20px) scale(0.8); opacity: 0; }
    20% { transform: translateX(-50%) translateY(0) scale(1.1); opacity: 1; }
    80% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-20px) scale(0.8); opacity: 0; }
}

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup-content {
    background: linear-gradient(45deg, #ff6b6b, #ffd93d);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    animation: popupAnim 0.5s ease-out;
}

@keyframes popupAnim {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.popup h3 { font-size: 32px; margin: 0 0 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
.popup button { padding: 15px 30px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
.popup button:hover { background: #45a049; transform: scale(1.05); }
</style>
</head>

<body>

<div class="game">
    <h2>🍭 Candy Crush 🍭</h2>
    
    <div id="levelDisplay">Level: <span id="level">1</span></div>
    
    <div id="scoreDisplay">
        Score: <span id="score">0</span> / <span id="targetScore">3000</span>
    </div>

    <div class="grid" id="grid"></div>

    <button id="resetButton" onclick="resetGame()">🔄 Restart</button>
</div>

<div id="comboMsg"></div>

<div id="levelUpPopup" class="popup" style="display: none;">
    <div class="popup-content">
        <h3>🎉 LEVEL UP! 🎉</h3>
        <p>🏆 Level <span id="nextLevelNum">2</span> Unlocked!</p>
        <p>Next Target: <span id="newTarget">6000</span></p>
        <button onclick="nextLevel()">Continue ➡️</button>
    </div>
</div>

<script>

const ROWS=8, COLS=8;
let board=[];
let selected=null;
let score=0;
let level=1;
let targetScore=3000;
let busy=false;

const colors=["Blue","Red","Green","Yellow","Purple"];
const CHOCO="Choco.png";

function getColor(c){
    if(!c) return null;
    return c.split("-")[0].replace(".png","");
}

function rand(){
    return colors[Math.floor(Math.random()*colors.length)] + ".png";
}

function striped(color,dir){
    return `${color}-Striped-${dir}.png`;
}

// ✅ FIXED: Better detection
function isChoco(candy) {
    return candy && (candy.includes("Choco") || candy === CHOCO);
}

function isStriped(candy) {
    return candy && candy.includes("Striped");
}

function checkLevelUp() {
    if (score >= targetScore && !busy) {
        level++;
        targetScore += 3000;
        document.getElementById('nextLevelNum').textContent = level;
        document.getElementById('newTarget').textContent = targetScore.toLocaleString();
        document.getElementById('levelUpPopup').style.display = 'flex';
        busy = true;
        document.querySelectorAll(".cell").forEach(x=>x.classList.remove("selected"));
        selected = null;
    }
}

function nextLevel() {
    document.getElementById('levelUpPopup').style.display = 'none';
    busy = false;
    updateDisplay();
}

function showCombo(msg) {
    const comboEl = document.getElementById('comboMsg');
    comboEl.textContent = msg;
    comboEl.style.display = 'block';
    setTimeout(() => comboEl.style.display = 'none', 2500);
}

// 🔥 FIXED COMBO DETECTION - Checks CURRENT BOARD STATE
function calculateComboMultiplier(matches) {
    let chocoCount = 0;
    let stripedCount = 0;
    
    // ✅ CHECK ALL CANDIES ON BOARD (not just matches)
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
            let candy = board[r][c];
            if (isChoco(candy)) chocoCount++;
            if (isStriped(candy)) stripedCount++;
        }
    }
    
    let multiplier = 1;
    let comboMsg = "";
    
    // 🎯 PRIORITY CHECKS
    if (chocoCount >= 2) {
        multiplier = 3;
        comboMsg = `💥 CHOCO x${chocoCount} COMBO! (3x Score)`;
    }
    else if (stripedCount >= 2) {
        multiplier = 2;
        comboMsg = `🔥 STRIPED x${stripedCount} COMBO! (2x Score)`;
    }
    else if (chocoCount >= 1 && stripedCount >= 1) {
        multiplier = 2.5;
        comboMsg = `⚡ CHOCO+STRIPED COMBO! (2.5x Score)`;
    }
    else if (chocoCount >= 1) {
        multiplier = 1.5;
        comboMsg = `⭐ CHOCO BONUS! (1.5x Score)`;
    }
    else if (stripedCount >= 1) {
        multiplier = 1.5;
        comboMsg = `⭐ STRIPED BONUS! (1.5x Score)`;
    }
    
    if (comboMsg) {
        showCombo(comboMsg);
        console.log(`Combo Debug: Choco=${chocoCount}, Striped=${stripedCount}, Multiplier=${multiplier}`); // DEBUG
        return multiplier;
    }
    return 1;
}

function create(){
    let grid=document.getElementById("grid");
    grid.innerHTML="";
    board=[];
    for(let r=0;r<ROWS;r++){
        board[r]=[];
        for(let c=0;c<COLS;c++){
            board[r][c]=rand();
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=r;
            cell.dataset.c=c;
            cell.onclick=click;
            grid.appendChild(cell);
        }
    }
    update();
}

function updateDisplay() {
    document.getElementById("level").innerText = level;
    document.getElementById("score").innerText = score.toLocaleString();
    document.getElementById("targetScore").innerText = targetScore.toLocaleString();
}

function update(){
    let cells=document.querySelectorAll(".cell");
    cells.forEach((cell,i)=>{
        let r=Math.floor(i/COLS);
        let c=i%COLS;
        let val=board[r][c];
        cell.style.backgroundImage=val ? `url('./images/${val}')` : "none";
    });
    updateDisplay();
}

function click(e){
    if(busy) return;
    let r=+e.target.dataset.r;
    let c=+e.target.dataset.c;
    if(!selected){
        selected={r,c};
        e.target.classList.add("selected");
        return;
    }
    let dr=Math.abs(selected.r-r);
    let dc=Math.abs(selected.c-c);
    if(dr+dc===1){
        swap(selected.r,selected.c,r,c);
    }
    document.querySelectorAll(".cell").forEach(x=>x.classList.remove("selected"));
    selected=null;
}

function swap(r1,c1,r2,c2){
    [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
    update();
    if(find().matches.length>0){
        busy=true;
        setTimeout(crush,200);
    }else{
        [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
        update();
    }
}

function find(){
    let matches=new Set();
    let specials=[];
    
    // HORIZONTAL
    for(let r=0;r<ROWS;r++){
        let count=1;
        for(let c=1;c<=COLS;c++){
            if(c<COLS && getColor(board[r][c])===getColor(board[r][c-1])){
                count++;
            }else{
                if(count>=3){
                    let start=c-count;
                    let color=getColor(board[r][start]);
                    for(let k=0;k<count;k++){
                        matches.add(`${r},${start+k}`);
                    }
                    if(count>=5){
                        specials.push({r:r, c:start+2, type:CHOCO});
                    }else if(count===4){
                        specials.push({r:r, c:start+1, type:striped(color,"Horizontal")});
                    }
                }
                count=1;
            }
        }
    }
    
    // VERTICAL
    for(let c=0;c<COLS;c++){
        let count=1;
        for(let r=1;r<=ROWS;r++){
            if(r<ROWS && getColor(board[r][c])===getColor(board[r-1][c])){
                count++;
            }else{
                if(count>=3){
                    let start=r-count;
                    let color=getColor(board[start][c]);
                    for(let k=0;k<count;k++){
                        matches.add(`${start+k},${c}`);
                    }
                    if(count>=5){
                        specials.push({r:start+2, c:c, type:CHOCO});
                    }else if(count===4){
                        specials.push({r:start+1, c:c, type:striped(color,"Vertical")});
                    }
                }
                count=1;
            }
        }
    }
    
    return {matches:[...matches].map(x=>x.split(",").map(Number)), specials};
}

function crush(){
    let {matches,specials}=find();
    
    if(matches.length===0){
        busy=false;
        checkLevelUp();
        return;
    }
    
    // 🔥 FIXED: Check combos BEFORE clearing matches
    let comboMultiplier = calculateComboMultiplier(matches);
    
    // Calculate scores
    let regularScore = matches.length * 10 * comboMultiplier;
    score += Math.round(regularScore);
    
    // Special bonuses
    let specialBonus = 0;
    matches.forEach(([r,c]) => {
        let candy = board[r][c];
        if (isChoco(candy)) specialBonus += 150 * comboMultiplier;
        if (isStriped(candy)) specialBonus += 100 * comboMultiplier;
    });
    score += Math.round(specialBonus);
    
    updateDisplay();

    // Clear matches AFTER scoring
    matches.forEach(([r,c])=>{
        board[r][c]=null;
    });

    // Place new specials
    specials.forEach(s=>{
        if(s.r>=0 && s.c>=0 && s.r<ROWS && s.c<COLS){
            board[s.r][s.c]=s.type;
        }
    });

    update();
    setTimeout(drop,200);
}

function drop(){
    for(let c=0;c<COLS;c++){
        let write=ROWS-1;
        for(let r=ROWS-1;r>=0;r--){
            if(board[r][c]!==null){
                board[write][c]=board[r][c];
                if(write!==r) board[r][c]=null;
                write--;
            }
        }
        while(write>=0){
            board[write][c]=rand();
            write--;
        }
    }
    update();
    setTimeout(()=>{
        if(find().matches.length>0){
            crush();
        }else{
            busy=false;
            checkLevelUp();
        }
    },200);
}

function resetGame(){
    score=0;
    level=1;
    targetScore=3000;
    busy=false;
    document.getElementById('levelUpPopup').style.display = 'none';
    document.getElementById('comboMsg').style.display = 'none';
    create();
    updateDisplay();
}

create();
updateDisplay();

</script>

</body>
</html>
